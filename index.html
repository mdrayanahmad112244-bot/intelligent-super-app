<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 AI Financial SuperApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 5px; font-size: 24px; }
        p.subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .nav-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; background: #1e293b; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 12px; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; display: none; }
        .card.active { display: block; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
        input, select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; margin-bottom: 15px; font-size: 16px; }
        button.btn-run { width: 100%; padding: 14px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-weight: bold; font-size: 16px; cursor: pointer; }
        .result-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; display: none; white-space: pre-line; line-height: 1.6; color: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AI Financial SuperApp</h1>
    <p class="subtitle">World-Class Speed & Intelligence</p>

    <!-- Navigation Tabs -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'stock')">📈 Stock</button>
        <button class="tab-btn" onclick="switchTab(event, 'roadmap')">💸 Roadmap</button>
        <button class="tab-btn" onclick="switchTab(event, 'business')">📊 Business</button>
    </div>

    <!-- 1. Stock Market UI -->
    <div id="stock-card" class="card active">
        <label>Enter Stock Symbol or Ask Financial Question:</label>
        <input type="text" id="stock-ticker" value="AAPL">
        <button class="btn-run" onclick="runAI('stock-ticker', 'stock-result', 'stock analysis')">Analyze with AI</button>
        <div id="stock-result" class="result-box"></div>
    </div>

    <!-- 2. Billionaire Roadmap UI -->
    <div id="roadmap-card" class="card">
        <label>Ask Wealth & Investment Questions:</label>
        <input type="text" id="roadmap-query" placeholder="যেমন: কিভাবে দ্রুত টাকা বাড়ানো যায়?">
        <button class="btn-run" onclick="runAI('roadmap-query', 'roadmap-result', 'wealth growth strategy')">Calculate Strategy</button>
        <div id="roadmap-result" class="result-box"></div>
    </div>

    <!-- 3. AI Business UI -->
    <div id="business-card" class="card">
        <label>Your Raw Business Idea or Question:</label>
        <input type="text" id="biz-idea" placeholder="e.g., AI clothing brand বা যেকোনো প্রশ্ন">
        <button class="btn-run" onclick="runAI('biz-idea', 'business-result', 'business masterplan')">Generate Masterplan</button>
        <div id="business-result" class="result-box"></div>
    </div>
</div>

<script>
    // এখানে আপনার ফ্রি Gemini API Key-টি বসাতে হবে। নিচে ফ্রি কী পাওয়ার নিয়ম দেওয়া আছে।
    const GEMINI_API_KEY = "AIzaSyCDCfgNfm9feTdN5GmKx4mGxg7RK4hG2xs"; 

    function switchTab(event, tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabName + '-card').classList.add('active');
    }

    async function runAI(inputId, resultId, contextType) {
        const userInput = document.getElementById(inputId).value;
        const resBox = document.getElementById(resultId);
        
        if (!userInput.trim()) {
            alert("অনুগ্রহ করে কিছু লিখুন!");
            return;
        }

        resBox.style.display = 'block';
        resBox.innerHTML = `⏳ Thinking... Real AI Mind is processing your request...`;

        // এআই-কে ফাইনান্সিয়াল এক্সপার্ট বানানোর প্রম্পট
        let systemPrompt = `You are the World's No.1 Advanced AI Financial Expert. Answer the user's question accurately in a professional yet friendly tone. If they speak or ask in Bengali, always answer in clear Bengali. Context of inquiry: ${contextType}. Question: ${userInput}`;

        try {
            const response = await fetch(`googleapis.com{GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let aiResponse = data.candidates[0].content.parts[0].text;
                // স্টার বা মার্কডাউন চিহ্নগুলো পরিষ্কার করার জন্য
                aiResponse = aiResponse.replace(/\*\*/g, '').replace(/\*/g, '•');
                resBox.innerHTML = aiResponse;
            } else {
                resBox.innerHTML = `❌ এআই রেসপন্স তৈরি করতে পারেনি। অনুগ্রহ করে এপিআই কী চেক করুন।`;
            }
        } catch (error) {
            resBox.innerHTML = `❌ সার্ভার বা এপিআই কানেকশনে সমস্যা হয়েছে! এপিআই কী ঠিক আছে তো?`;
            console.error(error);
        }
    }
</script>
</body>
</html>
