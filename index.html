<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 World's No.1 AI Financial Mind</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 5px; font-size: 24px; font-weight: 800; }
        p.subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 25px; }
        .nav-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; background: #0f172a; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 13px; transition: 0.3s; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; }
        .card { display: none; }
        .card.active { display: block; }
        label { display: block; margin-bottom: 10px; color: #cbd5e1; font-size: 14px; font-weight: 500; }
        textarea, input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #fff; margin-bottom: 15px; font-size: 15px; resize: none; outline: none; }
        textarea:focus, input:focus { border-color: #38bdf8; }
        button.btn-run { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 10px; color: #0f172a; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button.btn-run:hover { background: #0ea5e9; }
        .result-box { margin-top: 22px; padding: 18px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 8px; display: none; white-space: pre-line; line-height: 1.6; color: #e2e8f0; font-size: 14px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AI Financial SuperApp</h1>
    <p class="subtitle">Powered by World's No.1 AI Engine</p>

    <!-- Navigation Tabs -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'stock')">📈 Stock</button>
        <button class="tab-btn" onclick="switchTab(event, 'roadmap')">💸 Roadmap</button>
        <button class="tab-btn" onclick="switchTab(event, 'business')">📊 Business</button>
    </div>

    <!-- 1. Stock Market Card -->
    <div id="stock-card" class="card active">
        <label>যেকোনো কোম্পানির স্টক কোড দিন বা ফিন্যান্সিয়াল প্রশ্ন করুন:</label>
        <textarea id="stock-ticker" rows="3" placeholder="যেমন: AAPL স্টক এনালাইসিস করো অথবা স্টক মার্কেট কি?"></textarea>
        <button class="btn-run" onclick="askAI('stock-ticker', 'stock-result', 'Stock Market Analysis and Financial Trading')">Ask Live AI Engine</button>
        <div id="stock-result" class="result-box"></div>
    </div>

    <!-- 2. Billionaire Roadmap Card -->
    <div id="roadmap-card" class="card">
        <label>টাকা জমানো বা দ্রুত বড়লোক হওয়ার স্ট্র্যাটেজি জানতে চান?</label>
        <textarea id="roadmap-query" rows="3" placeholder="যেমন: কিভাবে দ্রুত অলস টাকা বাড়ানো যায়? রোডম্যাপ দাও।"></textarea>
        <button class="btn-run" onclick="askAI('roadmap-query', 'roadmap-result', 'Personal Finance Wealth Management and Long-term Investment')">Generate Strategy</button>
        <div id="roadmap-result" class="result-box"></div>
    </div>

    <!-- 3. AI Business Card -->
    <div id="business-card" class="card">
        <label>আপনার বিজনেস আইডিয়া বা যেকোনো ব্যবসার প্রশ্ন এখানে লিখুন:</label>
        <textarea id="biz-idea" rows="3" placeholder="e.g., কম পুঁজিতে অনলাইনে কি বিজনেস শুরু করা যায়?"></textarea>
        <button class="btn-run" onclick="askAI('biz-idea', 'business-result', 'Startup Business Idea, Budgeting and Growth Strategy')">Create Masterplan</button>
        <div id="business-result" class="result-box"></div>
    </div>
</div>

<script>
    // আপনার লাইভ চাবিটি এখানে সুন্দরভাবে প্রসেস করা হয়েছে
    const API_KEY = "AIzaSyCDCfgNfm9feTdN5GmKx4mGxg7RK4hG2xs";

    function switchTab(event, tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabName + '-card').classList.add('active');
    }

    async function askAI(inputId, resultId, context) {
        const userInput = document.getElementById(inputId).value;
        const resBox = document.getElementById(resultId);
        
        if (!userInput.trim()) {
            alert("অনুগ্রহ করে আপনার প্রশ্নটি লিখুন!");
            return;
        }

        resBox.style.display = 'block';
        resBox.innerHTML = `⏳ 🧠 বিশ্বের ১ নম্বর এআই আপনার প্রশ্নের লাইভ উত্তর ভাবছে...`;

        // নিখুঁত বাংলা উত্তরের জন্য এআই কে দেওয়া ডিরেক্টিভ প্রোফাইল
        const systemInstruction = `You are the World's No.1 Advanced AI Financial Expert. Answer the user's question with ultimate intelligence, data accuracy, and step-by-step guidance just like an expert human advisor. If the user asks in Bengali or English, ALWAYS respond in clear, easy-to-understand, natural Bengali with beautiful formatting. Context for this specific query: ${context}. User question: ${userInput}`;

        try {
            // গুগলের সবথেকে ফাস্ট ডাইনামিক লাইভ জেমিনি মডেল ২.৫ ফ্ল্যাশ গেটওয়ে
            const endpoint = `googleapis.com{API_KEY}`;
            
            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemInstruction }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let cleanResponse = data.candidates[0].content.parts[0].text;
                // এআই এর মার্কডাউন স্টারগুলো ইউজারদের রিডিবিলিটির সুবিধার্থে রিপ্লেস করা হলো
                cleanResponse = cleanResponse.replace(/\*\*/g, '').replace(/\*/g, '•');
                resBox.innerHTML = cleanResponse;
            } else {
                resBox.innerHTML = `❌ দুঃখিত! এআই কোনো তথ্য প্রসেস করতে পারেনি। আপনার প্রশ্নটি একটু বদলে আবার চেষ্টা করুন।`;
            }
        } catch (error) {
            resBox.innerHTML = `❌ এপিআই ইঞ্জিনে কোনো সংযোগ ত্রুটি ঘটেছে! আপনার ব্রাউজার বা ইন্টারনেট কানেকশন চেক করুন।`;
            console.error(error);
        }
    }
</script>
</body>
</html>
